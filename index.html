    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reacttutorial.dev/" />
    <meta property="og:title" content="ReactJS Tutorial – Learn React from Beginner to Enterprise" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ReactJS Tutorial Platform",
      "description": "Learn ReactJS from beginner to enterprise level",
      "url": "https://reacttutorial.dev",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://reacttutorial.dev/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <!-- Theme init: runs before React to prevent flash of wrong theme.
         Default is dark; respects stored preference. -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        // Default to dark when no preference is saved
        var isDark = stored === 'dark' || stored === null
        if (isDark) {
          document.documentElement.classList.add('dark')
          // Set bg immediately so there's no white flash before CSS loads
          document.documentElement.style.backgroundColor = '#030712'
        } else {
          document.documentElement.style.backgroundColor = '#ffffff'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
