    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ReactDocs",
      "description": "A production-focused React tutorial platform taking you from beginner to enterprise developer.",
      "url": "https://codewithraja.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://codewithraja.com/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <!-- Theme init: runs before React to prevent flash of wrong theme.
         Default is dark; respects stored preference. -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        // Default to dark when no preference is saved
        var isDark = stored === 'dark' || stored === null
        if (isDark) {
          document.documentElement.classList.add('dark')
          // Set bg immediately so there's no white flash before CSS loads
          document.documentElement.style.backgroundColor = '#030712'
        } else {
          document.documentElement.style.backgroundColor = '#ffffff'
        }
      })()
    </script>
